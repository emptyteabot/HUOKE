map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name leadpulseagi.com www.leadpulseagi.com leadpulse.cc.cd www.leadpulse.cc.cd;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 301 https://leadpulseagi.com$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name www.leadpulseagi.com;

    ssl_certificate /etc/letsencrypt/live/leadpulseagi.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/leadpulseagi.com/privkey.pem;

    return 301 https://leadpulseagi.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name leadpulse.cc.cd www.leadpulse.cc.cd;

    ssl_certificate /etc/nginx/ssl/leadpulse/leadpulse.crt;
    ssl_certificate_key /etc/nginx/ssl/leadpulse/leadpulse.key;

    return 301 https://leadpulseagi.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name leadpulseagi.com;

    ssl_certificate /etc/letsencrypt/live/leadpulseagi.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/leadpulseagi.com/privkey.pem;

    client_max_body_size 30m;

    location = /.well-known/mcp.json {
        proxy_pass http://127.0.0.1:8008/.well-known/mcp.json;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/mcp {
        proxy_pass http://127.0.0.1:8008/api/mcp;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v2/ {
        proxy_pass http://127.0.0.1:8008/api/v2/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    rewrite ^/leadpulse/?$ / permanent;
    rewrite ^/leadpulse/(.*)$ /$1 permanent;

    location / {
        proxy_pass http://127.0.0.1:3005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}
