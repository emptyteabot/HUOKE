server {
    listen 80;
    server_name leadpulseagi.com www.leadpulseagi.com leadpulse.cc.cd www.leadpulse.cc.cd;

    client_max_body_size 30m;

    return 301 https://leadpulseagi.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name leadpulse.cc.cd www.leadpulse.cc.cd;

    ssl_certificate /etc/nginx/ssl/leadpulse/leadpulse.crt;
    ssl_certificate_key /etc/nginx/ssl/leadpulse/leadpulse.key;

    return 301 https://leadpulseagi.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name leadpulseagi.com www.leadpulseagi.com;

    ssl_certificate /etc/letsencrypt/live/leadpulseagi.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/leadpulseagi.com/privkey.pem;

    client_max_body_size 30m;

    if ($host = www.leadpulseagi.com) {
        return 301 https://leadpulseagi.com$request_uri;
    }

    rewrite ^/leadpulse$ https://$host/ permanent;
    rewrite ^/leadpulse/$ https://$host/ permanent;
    rewrite ^/leadpulse/(.*)$ https://$host/$1 permanent;

    location / {
        proxy_pass http://127.0.0.1:3005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection upgrade;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}
